<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riddles Cleaning</title>

<style>
body {
margin: 0;
background: #0d0d0d;
font-family: Arial, sans-serif;
color: #fff;
text-align: center;
}

header {
padding: 40px 20px 20px;
}

.main-image {
max-width: 320px;
border-radius: 12px;
margin-bottom: 25px;
box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

/* Buttons */
.buttons {
display: flex;
flex-direction: column;
gap: 15px;
max-width: 320px;
margin: auto;
padding-bottom: 40px;
}

.btn {
padding: 15px;
border-radius: 8px;
font-weight: bold;
text-decoration: none;
color: white;
transition: 0.3s;
}

.btn:hover {
opacity: 0.85;
transform: translateY(-2px);
}

.call { background: #28a745; }
.facebook { background: #1877F2; }
.tiktok { background: #111; border: 1px solid #fff; }
.custom { background: #6f42c1; }

/* Gallery */
#gallery {
padding: 60px 20px;
background: #111;
}

#gallery h2 {
margin-bottom: 40px;
font-size: 28px;
}

.gallery-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
gap: 15px;
max-width: 1100px;
margin: auto;
}

.gallery-grid img {
width: 100%;
height: 200px;
object-fit: cover;
border-radius: 10px;
cursor: pointer;
transition: 0.3s;
}

.gallery-grid img:hover {
transform: scale(1.05);
}

/* Lightbox */
#lightbox {
position: fixed;
display: none;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0,0,0,0.95);
justify-content: center;
align-items: center;
flex-direction: column;
z-index: 999;
}

#lightbox img {
max-width: 90%;
max-height: 80%;
border-radius: 10px;
}

.arrow {
position: absolute;
top: 50%;
transform: translateY(-50%);
font-size: 40px;
color: white;
cursor: pointer;
padding: 10px;
}

.arrow.left { left: 20px; }
.arrow.right { right: 20px; }

/* Before/After */
#before-after {
padding: 60px 20px;
background: #0d0d0d;
}

.compare-container {
position: relative;
max-width: 800px;
margin: auto;
overflow: hidden;
border-radius: 12px;
}

.compare-container img {
width: 100%;
display: block;
}

.overlay {
position: absolute;
top: 0;
left: 0;
height: 100%;
width: 50%;
overflow: hidden;
}

.slider {
position: absolute;
top: 0;
left: 50%;
width: 4px;
height: 100%;
background: white;
cursor: ew-resize;
}
</style>
</head>

<body>

<header>
<img class="main-image" src="Screenshot_20260116_205523_ChatGPT.jpg" alt="Riddles Cleaning">

<div class="buttons">
<a class="btn custom" href="https://riddlescleaning.github.io/RiddlesKeyRings-Things.github.io-/" target="_blank">Custom Gifts</a>
<a class="btn call" href="tel:6094128005">Call Now</a>
<a class="btn facebook" href="https://www.facebook.com/jackie.riddle.98" target="_blank">Facebook</a>
<a class="btn tiktok" href="https://www.tiktok.com/@jackieriddle4" target="_blank">TikTok</a>
</div>
</header>

<!-- GALLERY -->
<section id="gallery">
<h2>Our Work</h2>

<div class="gallery-grid">
<img src="1 clean closet floor.JPG" onclick="openLightbox(0)">
<img src="13 right side bed clean.JPG" onclick="openLightbox(1)">
<img src="10 corner bottom after 2.JPG" onclick="openLightbox(2)">
<img src="images/photo4.jpg" onclick="openLightbox(3)">
<img src="images/photo5.jpg" onclick="openLightbox(4)">
<img src="images/photo6.jpg" onclick="openLightbox(5)">
<img src="images/photo7.jpg" onclick="openLightbox(6)">
<img src="images/photo8.jpg" onclick="openLightbox(7)">
<img src="images/photo9.jpg" onclick="openLightbox(8)">
<img src="images/photo10.jpg" onclick="openLightbox(9)">
</div>
</section>

<!-- BEFORE & AFTER -->
<section id="before-after">
  <h2>Before & After</h2>
  <div class="compare-container" id="compare">
    <img src="15 corner bottom before 1.JPG" alt="Before Cleaning">
    <div class="overlay" id="overlay">
      <img src="7 corner bottom after 1.JPG" alt="After Cleaning">
    </div>
    <div class="slider" id="slider"></div>
  </div>
</section>

<style>
#before-after {
  padding: 60px 20px;
  background: #0d0d0d;
  text-align: center;
}

.compare-container {
  position: relative;
  max-width: 800px;
  margin: auto;
  overflow: hidden;
  border-radius: 12px;
  user-select: none;
}

.compare-container img {
  width: 100%;
  display: block;
}

.overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 50%;
  height: 100%;
  overflow: hidden;
}

.overlay img {
  display: block;
  width: 100%;
  height: auto;
}

.slider {
  position: absolute;
  top: 0;
  left: 50%;
  width: 4px;
  height: 100%;
  background: white;
  cursor: ew-resize;
  z-index: 2;
}
</style>

<script>
const slider = document.getElementById("slider");
const overlay = document.getElementById("overlay");
const container = document.getElementById("compare");

let dragging = false;

// Start dragging
slider.addEventListener("mousedown", () => dragging = true);
document.addEventListener("mouseup", () => dragging = false);

// Move slider
document.addEventListener("mousemove", (e) => {
  if (!dragging) return;
  let rect = container.getBoundingClientRect();
  let offsetX = e.clientX - rect.left;
  if (offsetX < 0) offsetX = 0;
  if (offsetX > rect.width) offsetX = rect.width;
  overlay.style.width = offsetX + "px";
  slider.style.left = offsetX + "px";
});

// Optional: touch support for mobile
slider.addEventListener("touchstart", () => dragging = true);
document.addEventListener("touchend", () => dragging = false);
document.addEventListener("touchmove", (e) => {
  if (!dragging) return;
  let touch = e.touches[0];
  let rect = container.getBoundingClientRect();
  let offsetX = touch.clientX - rect.left;
  if (offsetX < 0) offsetX = 0;
  if (offsetX > rect.width) offsetX = rect.width;
  overlay.style.width = offsetX + "px";
  slider.style.left = offsetX + "px";
});
</script>

<!-- LIGHTBOX -->
<div id="lightbox">
<span class="arrow left" onclick="changeSlide(-1)">❮</span>
<img id="lightbox-img">
<span class="arrow right" onclick="changeSlide(1)">❯</span>
</div>

<script>
let images = document.querySelectorAll(".gallery-grid img");
let currentIndex = 0;

function openLightbox(index) {
currentIndex = index;
document.getElementById("lightbox").style.display = "flex";
document.getElementById("lightbox-img").src = images[index].src;
}

function changeSlide(direction) {
currentIndex += direction;
if (currentIndex < 0) currentIndex = images.length - 1;
if (currentIndex >= images.length) currentIndex = 0;
document.getElementById("lightbox-img").src = images[currentIndex].src;
}

document.getElementById("lightbox").addEventListener("click", function(e) {
if (e.target.id === "lightbox") {
this.style.display = "none";
}
});

/* Before & After Slider */
let slider = document.getElementById("slider");
let overlay = document.getElementById("overlay");
let container = document.getElementById("compare");

slider.addEventListener("mousedown", function(e) {
document.onmousemove = function(e) {
let rect = container.getBoundingClientRect();
let offset = e.clientX - rect.left;
if (offset < 0) offset = 0;
if (offset > rect.width) offset = rect.width;
overlay.style.width = offset + "px";
slider.style.left = offset + "px";
}
document.onmouseup = function() {
document.onmousemove = null;
}
});
</script>

</body>
</html>
