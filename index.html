<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Shore Thing Cleaning Solutions</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<script src="https://js.stripe.com/v3/"></script>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#eaf6ff,#ffffff);
color:#222;
}

h2{
font-family:'Great Vibes',cursive;
font-size:44px;
text-align:center;
}

/* HEADER */
header{text-align:center;padding:60px 20px;}
.main-image{max-width:340px;border-radius:18px;box-shadow:0 25px 70px rgba(0,0,0,.25);margin-bottom:30px;}

.buttons{display:flex;flex-wrap:wrap;justify-content:center;gap:15px;}

.btn{
padding:14px 26px;
border-radius:40px;
font-weight:600;
cursor:pointer;
border:2px solid white;
transition:.3s;
text-decoration:none;
display:flex;
align-items:center;
gap:8px;
}

/* BOOK CLEANING */
.book-cleaning{
background:#d8b4fe;
color:white;
border:2px solid #3b82f6;
animation:pulseBorder 2s infinite;
position:relative;
overflow:hidden;
}
@keyframes pulseBorder{
0%{box-shadow:0 0 0 0 #3b82f6;}
70%{box-shadow:0 0 0 10px transparent;}
100%{box-shadow:0 0 0 0 transparent;}
}
.book-cleaning::after{
content:"";
position:absolute;
top:0;left:-100%;
width:100%;height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,.7),transparent);
transition:.6s;
}
.book-cleaning:hover::after{left:100%;}

/* CALL */
.call{background:#16a34a;color:white;border:2px solid white;}

/* FACEBOOK */
.facebook{background:#1877F2;color:white;border:2px solid white;}

/* TIKTOK */
.tiktok{background:black;color:white;border:2px solid white;}

/* CHOCOLATE BUTTON */
.chocolate{
background:linear-gradient(45deg,#5c2c06,#8b4513,#5c2c06);
color:#fff8dc;
border:2px solid #3e1f04;
box-shadow:inset 0 0 10px rgba(0,0,0,.6);
}

/* GALLERY */
section{padding:80px 20px;text-align:center;}
.gallery-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
max-width:1100px;
margin:auto;
}
.gallery-grid img{
width:100%;
height:220px;
object-fit:cover;
border-radius:14px;
cursor:pointer;
transition:.4s;
}
.gallery-grid img:hover{transform:scale(1.05);}

/* BEFORE AFTER */
.compare-container{
position:relative;
max-width:900px;
margin:50px auto;
overflow:hidden;
border-radius:18px;
box-shadow:0 20px 60px rgba(0,0,0,.25);
}
.compare-container img{width:100%;display:block;}
.overlay{
position:absolute;
top:0;left:0;width:50%;height:100%;overflow:hidden;
}
.overlay img{height:100%;object-fit:cover;}
.slider{
position:absolute;top:0;left:50%;width:4px;height:100%;background:white;cursor:ew-resize;
}
.slider::after{
content:"";position:absolute;top:50%;left:-12px;transform:translateY(-50%);
width:26px;height:26px;border-radius:50%;background:white;box-shadow:0 0 10px black;
}

/* POPUPS */
.popup{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
justify-content:center;
align-items:flex-start;
padding:60px 20px;
overflow:auto;
z-index:5000;
}
.popup-content{
background:white;
padding:40px;
border-radius:20px;
max-width:650px;
width:100%;
margin:auto;
position:relative;
}
.close-popup{position:absolute;right:15px;top:10px;font-size:22px;cursor:pointer;}

form input,form select,form textarea{
width:100%;
padding:14px;margin:10px 0;border-radius:10px;border:1px solid #ccc;
}

.total-display{font-weight:bold;margin:10px 0;font-size:18px;}

.submit-btn{
background:linear-gradient(45deg,#d4af37,#f5e27a,#d4af37);
border:2px solid black;
padding:16px;
border-radius:40px;
font-weight:bold;
cursor:pointer;
transition:.4s;
}
.submit-btn:hover{transform:scale(1.05);box-shadow:0 0 20px #d4af37;}

/* Floating Button */
.floating-book{
position:fixed;
bottom:20px;
right:20px;
background:#3b82f6;
color:white;
padding:15px 20px;
border-radius:50px;
font-weight:bold;
box-shadow:0 10px 30px rgba(0,0,0,.3);
cursor:pointer;
z-index:6000;
}

@media(min-width:768px){
.floating-book{display:none;}
}

</style>
</head>
<body>

<header>
<img src="header image.JPG" class="main-image">

<div class="buttons">
<a class="btn book-cleaning" onclick="openCleaning()">Book Cleaning</a>
<a class="btn chocolate" onclick="openChocolate()">Dubai Chocolate</a>
<a class="btn call" href="tel:6094128005">Call Now</a>
<a class="btn facebook" href="https://facebook.com/jackie.riddle.98" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" width="18"> Facebook</a>
<a class="btn tiktok" href="https://www.tiktok.com/@jackieriddle4" target="_blank">TikTok</a>
</div>
</header>

<section>
<h2>Our Work</h2>
<div class="gallery-grid">
<img src="13 right side bed clean.JPG">
<img src="4 corner after 1.JPG">
<img src="1 clean closet floor.JPG">
<img src="10 corner bottom after 2.JPG">
<img src="11 window sill bottom after.JPG">
</div>
</section>

<section>
<h2>Before & After</h2>

<div class="compare-container">
<img src="7 corner bottom after 1.JPG">
<div class="overlay"><img src="15 corner bottom before 1.JPG"></div>
<div class="slider"></div>
</div>

<div class="compare-container">
<img src="nasty after.JPG">
<div class="overlay"><img src="nasty before.JPG"></div>
<div class="slider"></div>
</div>

<div class="compare-container">
<img src="sink after 1.JPG">
<div class="overlay"><img src="sink 1 before.JPG"></div>
<div class="slider"></div>
</div>

</section>

<!-- CLEANING POPUP -->
<div id="cleaningPopup" class="popup">
<div class="popup-content">
<span class="close-popup" onclick="closeCleaning()">&times;</span>
<h2>Cleaning Request</h2>

<form id="cleaningForm">
<select id="cleanPackage">
<option value="">Select Package</option>
<option value="110">Standard Cleaning</option>
<option value="200">Deep Cleaning</option>
<option value="250">Move In/Out</option>
</select>

<input type="text" placeholder="Home Size (Small/Medium/Large)">
<input type="tel" placeholder="Phone Number">
<input type="text" placeholder="Address">
<input type="text" placeholder="Availability">
<textarea placeholder="Additional Requests"></textarea>

<div class="total-display">Estimated Total: $<span id="cleanTotal">0</span></div>

<button type="button" class="submit-btn" onclick="payCleaning()">Pay Online</button>
<button type="submit" class="submit-btn">Send Request</button>
</form>
</div>
</div>

<!-- CHOCOLATE POPUP -->
<div id="chocolatePopup" class="popup">
<div class="popup-content">
<span class="close-popup" onclick="closeChocolate()">&times;</span>
<h2>Dubai Chocolate Order</h2>

<form id="chocolateForm">
<select id="chocoType" onchange="updateChocolateForm()">
<option value="">Select Product</option>
<option value="5">Dubai Cookie - $5</option>
<option value="10">Small Bar - $10</option>
<option value="15">Large Bar - $15</option>
</select>

<div id="quantityArea" style="display:none;">
<input type="number" id="chocoQty" min="1" value="1">
</div>

<select id="deliverySelect">
<option value="0">Pickup</option>
<option value="10">Delivery</option>
</select>

<input type="tel" placeholder="Phone Number">
<input type="text" placeholder="Request By Date">

<div class="total-display">Total: $<span id="chocoTotal">0</span></div>

<button type="button" class="submit-btn" onclick="payChocolate()">Pay Online</button>
<button type="submit" class="submit-btn">Send Order</button>
</form>
</div>
</div>

<div class="floating-book" onclick="openCleaning()">Book Now</div>

<script>
const stripe = Stripe("YOUR_STRIPE_PUBLIC_KEY");

/* Open/Close */
function openCleaning(){cleaningPopup.style.display="flex";}
function closeCleaning(){cleaningPopup.style.display="none";}
function openChocolate(){chocolatePopup.style.display="flex";}
function closeChocolate(){chocolatePopup.style.display="none";}
window.onclick=e=>{if(e.target.classList.contains("popup"))e.target.style.display="none";}

/* Chocolate Dynamic */
function updateChocolateForm(){
let type=chocoType.value;
quantityArea.style.display= type? "block":"none";
calculateChocolate();
}
function calculateChocolate(){
let price=parseInt(chocoType.value)||0;
let qty=parseInt(chocoQty.value)||1;
let delivery=parseInt(deliverySelect.value)||0;
let total=price*qty;
if(delivery && total<=50) total+=10;
chocoTotal.innerText=total;
}
chocoQty?.addEventListener("input",calculateChocolate);
deliverySelect?.addEventListener("change",calculateChocolate);
chocoType?.addEventListener("change",calculateChocolate);

/* Cleaning Calculator */
cleanPackage?.addEventListener("change",()=>{cleanTotal.innerText=cleanPackage.value||0});

/* Stripe Payments */
function payCleaning(){
stripe.redirectToCheckout({
lineItems:[{price_data:{currency:'usd',product_data:{name:'Cleaning Service'},unit_amount:cleanTotal.innerText*100},quantity:1}],
mode:'payment',
successUrl:window.location.href,
cancelUrl:window.location.href
});
}

function payChocolate(){
stripe.redirectToCheckout({
lineItems:[{price_data:{currency:'usd',product_data:{name:'Dubai Chocolate'},unit_amount:chocoTotal.innerText*100},quantity:1}],
mode:'payment',
successUrl:window.location.href,
cancelUrl:window.location.href
});
}
</script>

</body>
</html>
