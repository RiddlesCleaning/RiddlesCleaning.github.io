<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Shore Thing Cleaning Solutions</title>

<!-- Elegant Script Font -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

/* ================= GLOBAL ================= */
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#eaf6ff,#ffffff);
color:#222;
}

h2{
font-family:'Great Vibes',cursive;
font-size:44px;
margin-bottom:20px;
color:#0d2c4a;
}

section{padding:90px 20px;text-align:center;}

/* ================= HEADER ================= */
header{text-align:center;padding:60px 20px 30px;}
.main-image{
max-width:340px;
border-radius:18px;
box-shadow:0 25px 70px rgba(0,0,0,0.25);
margin-bottom:30px;
}

/* Buttons restored */
.buttons{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
}

.btn{
padding:14px 28px;
border-radius:40px;
font-weight:600;
text-decoration:none;
cursor:pointer;
transition:.3s;
border:2px solid #0072ff;
background:white;
color:#0072ff;
}

.btn:hover{
background:#0072ff;
color:white;
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(0,0,0,.2);
}

/* ================= GALLERY ================= */
#gallery{background:white;}
.gallery-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
max-width:1100px;
margin:40px auto 0;
}
.gallery-grid img{
width:100%;
height:220px;
object-fit:cover;
border-radius:14px;
transition:.4s;
box-shadow:0 15px 40px rgba(0,0,0,.1);
cursor:pointer;
}
.gallery-grid img:hover{transform:scale(1.05);}

/* ================= BEFORE AFTER ================= */
.before-after-section{background:#f4f7fb;}

.compare-container{
position:relative;
max-width:900px;
margin:50px auto;
border-radius:18px;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,.25);
}

.compare-container img{width:100%;display:block;}

.overlay{
position:absolute;
top:0;
left:0;
width:50%;
height:100%;
overflow:hidden;
}

.overlay img{
height:100%;
object-fit:cover;
}

/* Swapped images: BEFORE is base, AFTER overlay */

.slider{
position:absolute;
top:0;
left:50%;
width:4px;
height:100%;
background:white;
cursor:ew-resize;
}

.slider::after{
content:"";
position:absolute;
top:50%;
left:-12px;
transform:translateY(-50%);
width:28px;
height:28px;
border-radius:50%;
background:white;
box-shadow:0 0 15px rgba(0,0,0,.6);
}

/* ================= POPUPS ================= */
.popup{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
justify-content:center;
align-items:flex-start;
padding:60px 20px;
overflow-y:auto;
z-index:5000;
}

.popup-content{
background:white;
border-radius:20px;
padding:40px;
max-width:650px;
width:100%;
position:relative;
box-shadow:0 40px 100px rgba(0,0,0,.5);
margin:auto;
}

.close-popup{
position:absolute;
right:15px;
top:10px;
font-size:24px;
cursor:pointer;
}

form input,form select,form textarea{
width:100%;
padding:14px;
margin:10px 0;
border-radius:10px;
border:1px solid #ccc;
}

/* UNIQUE GOLD BUTTON */
.submit-btn{
width:100%;
padding:16px;
border-radius:40px;
font-weight:bold;
font-size:16px;
cursor:pointer;
background:linear-gradient(45deg,#c9a227,#f8e27c,#c9a227);
border:2px solid black;
color:black;
position:relative;
overflow:hidden;
transition:.4s;
}

.submit-btn::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,.6),transparent);
transition:.6s;
}

.submit-btn:hover::before{left:100%;}
.submit-btn:hover{
transform:scale(1.05);
box-shadow:0 0 25px #c9a227;
}

/* ================= SEAL ================= */
.seal{
margin:80px auto;
width:200px;
height:200px;
border-radius:50%;
background:radial-gradient(circle at 30% 30%,#fff8c6,#d4af37,#b8860b);
display:flex;
align-items:center;
justify-content:center;
text-align:center;
font-weight:bold;
color:black;
box-shadow:0 0 40px rgba(0,0,0,.4);
border:6px solid #000;
}

.seal span{
font-size:16px;
line-height:1.4;
}

#lightbox{
position:fixed;
display:none;
inset:0;
background:rgba(0,0,0,.95);
justify-content:center;
align-items:center;
z-index:4000;
}
#lightbox img{max-width:90%;max-height:85%;}

</style>
</head>
<body>

<header>
<img src="header image.JPG" class="main-image">

<div class="buttons">
<a class="btn" href="https://riddlescleaning.github.io/RiddlesKeyRings-Things.github.io-/" target="_blank">Custom Gifts</a>
<a class="btn" onclick="openCleaning()">Book Cleaning</a>
<a class="btn" onclick="openChocolate()">Dubai Chocolate</a>
<a class="btn" href="tel:6094128005">Call Now</a>
<a class="btn" href="https://facebook.com/jackie.riddle.98" target="_blank">Facebook</a>
<a class="btn" href="https://www.tiktok.com/@jackieriddle4" target="_blank">TikTok</a>
</div>
</header>

<section id="gallery">
<h2>Our Work</h2>
<div class="gallery-grid">
<img src="13 right side bed clean.JPG" onclick="openLightbox(this)">
<img src="4 corner after 1.JPG" onclick="openLightbox(this)">
<img src="1 clean closet floor.JPG" onclick="openLightbox(this)">
<img src="10 corner bottom after 2.JPG" onclick="openLightbox(this)">
<img src="11 window sill bottom after.JPG" onclick="openLightbox(this)">
</div>
</section>

<section class="before-after-section">
<h2>Before & After</h2>

<div class="compare-container">
<img src="15 corner bottom before 1.JPG">
<div class="overlay"><img src="7 corner bottom after 1.JPG"></div>
<div class="slider"></div>
</div>

<div class="compare-container">
<img src="nasty before.JPG">
<div class="overlay"><img src="nasty after.JPG"></div>
<div class="slider"></div>
</div>

<div class="compare-container">
<img src="sink 1 before.JPG">
<div class="overlay"><img src="sink after 1.JPG"></div>
<div class="slider"></div>
</div>

</section>

<!-- CLEANING POPUP -->
<div id="cleaningPopup" class="popup">
<div class="popup-content">
<span class="close-popup" onclick="closeCleaning()">&times;</span>
<h2>Cleaning Service Request</h2>

<form onsubmit="sendCleaning(event)">
<select required>
<option value="">Select Package</option>
<option>Standard Cleaning</option>
<option>Deep Cleaning</option>
<option>Move In/Out Cleaning</option>
</select>
<input type="tel" placeholder="Phone Number" required>
<input type="text" placeholder="Service Address" required>
<input type="text" placeholder="Availability (Dates/Times)" required>
<textarea placeholder="Additional Requests"></textarea>
<button class="submit-btn">Submit Cleaning Request</button>
</form>
</div>
</div>

<!-- CHOCOLATE POPUP -->
<div id="chocolatePopup" class="popup">
<div class="popup-content">
<span class="close-popup" onclick="closeChocolate()">&times;</span>
<h2>Dubai Chocolate Order</h2>

<form onsubmit="sendChocolate(event)">
<select required>
<option value="">Select Item</option>
<option>Dubai Cookie - $5</option>
<option>Small Bar - $10</option>
<option>Large Bar - $15</option>
</select>
<input type="number" placeholder="Quantity" required>
<input type="tel" placeholder="Phone Number" required>
<input type="text" placeholder="Requested By Date" required>
<select>
<option>Pickup</option>
<option>Delivery ($10+ on orders $50 & under)</option>
</select>
<button class="submit-btn">Submit Chocolate Order</button>
</form>
</div>
</div>

<div class="seal">
<span>Woman-Owned<br>Small Business</span>
</div>

<div id="lightbox" onclick="this.style.display='none'">
<img id="lightbox-img">
</div>

<script>
function openCleaning(){document.getElementById("cleaningPopup").style.display="flex";}
function closeCleaning(){document.getElementById("cleaningPopup").style.display="none";}
function openChocolate(){document.getElementById("chocolatePopup").style.display="flex";}
function closeChocolate(){document.getElementById("chocolatePopup").style.display="none";}
window.onclick=e=>{if(e.target.classList.contains("popup"))e.target.style.display="none";}
function openLightbox(img){document.getElementById("lightbox").style.display="flex";document.getElementById("lightbox-img").src=img.src;}
</script>

</body>
</html>
