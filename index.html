<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Shore Thing Cleaning Solutions</title>

<style>
/* ================= Body ================= */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #add8e6;
  color: #fff;
  text-align: center;
}

/* ================= Header ================= */
header {
  padding: 40px 20px 20px;
}

.main-image {
  max-width: 320px;
  border-radius: 12px;
  margin-bottom: 25px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

/* ================= Buttons ================= */
.buttons {
  display: flex;
  flex-direction: column;
  gap: 15px;
  max-width: 320px;
  margin: auto;
  padding-bottom: 40px;
}

.btn {
  padding: 15px;
  border-radius: 8px;
  font-weight: bold;
  text-decoration: none;
  color: white;
  transition: 0.3s;
  cursor: pointer;
}

.btn:hover {
  opacity: 0.85;
  transform: translateY(-2px);
}

.call { background: #28a745; border: 3px solid #fff; }
.facebook { background: #1877F2; border: 3px solid #fff; }
.tiktok { background: #111; border: 3px solid #fff; }
.custom { background: #6f42c1; border: 3px solid #fff; }

/* Gold shimmer for Dubai Chocolate button */
.chocolate {
  background: linear-gradient(45deg,#d4af37,#8B4513);
  border: 3px solid #fff;
  position: relative;
  overflow: hidden;
}

.chocolate::before {
  content: "";
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: linear-gradient(45deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 50%, rgba(255,255,255,0.4) 100%);
  transform: rotate(25deg);
  transition: all 0.5s;
}

.chocolate:hover::before {
  animation: shimmer 2s infinite;
}

@keyframes shimmer {
  0% { transform: rotate(25deg) translate(-100%, -100%); }
  100% { transform: rotate(25deg) translate(100%, 100%); }
}

/* ================= Gallery ================= */
#gallery {
  padding: 60px 20px;
  background: #6f42c1;
}

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  max-width: 1100px;
  margin: auto;
}

.gallery-grid img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.gallery-grid img:hover {
  transform: scale(1.05);
}

/* ================= Lightbox ================= */
#lightbox {
  position: fixed;
  display: none;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 999;
}

#lightbox img {
  max-width: 90%;
  max-height: 80%;
  border-radius: 10px;
}

.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 40px;
  color: white;
  cursor: pointer;
  padding: 10px;
  user-select: none;
}

.arrow.left { left: 20px; }
.arrow.right { right: 20px; }

/* ================= Before/After ================= */
.before-after-section {
  padding: 60px 20px;
  background: #0d0d0d;
}

.compare-container {
  position: relative;
  max-width: 800px;
  margin: 0 auto 50px auto; /* centers slider */
  overflow: hidden;
  border-radius: 12px;
}

.compare-container img {
  display: block;
  width: 100%;
}

.overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 50%;
  height: 100%;
  overflow: hidden;
}

.overlay img {
  height: 100%;
  object-fit: cover;
}

.slider {
  position: absolute;
  top: 0;
  left: 50%;
  width: 4px;
  height: 100%;
  background: white;
  cursor: ew-resize;
}

/* ================= Chocolate Popup ================= */
#chocolatePopup {
  display: none;
  position: fixed;
  z-index: 5000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
  overflow-y: auto;
  padding: 20px;
}

.chocolate-content {
  background: white;
  color: #333;
  width: 100%;
  max-width: 550px;
  padding: 25px;
  border-radius: 15px;
  position: relative;
  text-align: center;
  max-height: 90vh; /* scrollable if content too tall */
  overflow-y: auto;
}

.close-chocolate {
  position: absolute;
  right: 15px;
  top: 10px;
  font-size: 22px;
  cursor: pointer;
}

.product-gallery {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 15px;
}

.product-gallery img {
  width: 100%;
  height: 90px;
  object-fit: cover;
  border-radius: 8px;
}

.package-box {
  background: #f3f3f3;
  padding: 8px;
  margin: 6px 0;
  border-radius: 8px;
  font-weight: bold;
}

.chocolate-content input,
.chocolate-content select,
.chocolate-content textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.total-display {
  font-size: 18px;
  font-weight: bold;
  margin: 10px 0;
  color: #8B4513;
}

.payment-buttons {
  display: flex;
  gap: 10px;
  margin: 15px 0;
}

.pay-btn {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  color: white;
  text-decoration: none;
  font-weight: bold;
}

.cashapp { background: #00C244; }
.venmo { background: #3D95CE; }

.submit-btn {
  background: #8B4513;
  color: white;
  padding: 14px;
  border: none;
  border-radius: 8px;
  width: 100%;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <img class="main-image" src="header image.JPG" alt="A Shore Thing">

  <div class="buttons">
    <a class="btn custom" href="https://riddlescleaning.github.io/RiddlesKeyRings-Things.github.io-/" target="_blank">Custom Gifts</a>
    <a class="btn call" href="tel:6094128005">Call Now</a>
    <a class="btn facebook" href="https://facebook.com/jackie.riddle.98" target="_blank">Facebook</a>
    <a class="btn tiktok" href="https://www.tiktok.com/@jackieriddle4" target="_blank">TikTok</a>
    <a class="btn chocolate" onclick="openChocolatePopup()">Dubai Chocolate</a>
  </div>
</header>

<!-- Gallery -->
<section id="gallery">
  <h2>Our Work</h2>
  <div class="gallery-grid">
    <img src="13 right side bed clean.JPG" onclick="openLightbox(this)">
    <img src="4 corner after 1.JPG" onclick="openLightbox(this)">
    <img src="1 clean closet floor.JPG" onclick="openLightbox(this)">
    <img src="10 corner bottom after 2.JPG" onclick="openLightbox(this)">
    <img src="11 window sill bottom after.JPG" onclick="openLightbox(this)">
  </div>
</section>

<!-- Before/After Sections -->
<section class="before-after-section">
  <h2>Before & After 1</h2>
  <div class="compare-container">
    <img src="7 corner bottom after 1.JPG">
    <div class="overlay">
      <img src="15 corner bottom before 1.JPG">
    </div>
    <div class="slider"></div>
  </div>
</section>

<section class="before-after-section">
  <h2>Before & After 2</h2>
  <div class="compare-container">
    <img src="nasty after.JPG">
    <div class="overlay">
      <img src="nasty before.JPG">
    </div>
    <div class="slider"></div>
  </div>
</section>

<section class="before-after-section">
  <h2>Before & After 3</h2>
  <div class="compare-container">
    <img src="sink after 1.JPG">
    <div class="overlay">
      <img src="sink 1 before.JPG">
    </div>
    <div class="slider"></div>
  </div>
</section>

<!-- Lightbox -->
<div id="lightbox">
  <span class="arrow left" onclick="changeSlide(-1)">❮</span>
  <img id="lightbox-img">
  <span class="arrow right" onclick="changeSlide(1)">❯</span>
</div>

<!-- Chocolate Popup -->
<div id="chocolatePopup">
  <div class="chocolate-content">
    <span class="close-chocolate" onclick="closeChocolatePopup()">&times;</span>
    <h2>Luxury Dubai Chocolate</h2>

    <div class="product-gallery">
      <img src="chocolate1.jpg">
      <img src="chocolate2.jpg">
      <img src="chocolate3.jpg">
    </div>

    <div class="package-box">Small Box – $15</div>
    <div class="package-box">Medium Box – $25</div>
    <div class="package-box">Large Box – $40</div>

    <form onsubmit="sendChocolateOrder(event)">
      <input type="text" id="cname" placeholder="Your Name" required>
      <input type="tel" id="cphone" placeholder="Your Phone Number" required>

      <select id="cpackage" onchange="calculateChocolateTotal()" required>
        <option value="">Select Package</option>
        <option value="15">Small Box – $15</option>
        <option value="25">Medium Box – $25</option>
        <option value="40">Large Box – $40</option>
      </select>

      <select id="cdelivery" onchange="calculateChocolateTotal()">
        <option value="0">Pickup – Free</option>
        <option value="5">Local Delivery – $5</option>
      </select>

      <div class="total-display">
        Total: $<span id="chocolateTotal">0</span>
      </div>

      <textarea id="cnotes" placeholder="Pickup date or instructions"></textarea>

      <div class="payment-buttons">
        <a href="https://cash.app/$YOURCASHTAG" target="_blank" class="pay-btn cashapp">Cash App</a>
        <a href="https://venmo.com/YOURVENMO" target="_blank" class="pay-btn venmo">Venmo</a>
      </div>

      <button type="submit" class="submit-btn">Text Order</button>
    </form>
  </div>
</div>

<script>
// ============ Lightbox ============
let galleryImages = document.querySelectorAll(".gallery-grid img");
let currentIndex = 0;

function openLightbox(img) {
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = img.src;
  currentIndex = Array.from(galleryImages).indexOf(img);
}

function changeSlide(direction) {
  currentIndex += direction;
  if (currentIndex < 0) currentIndex = galleryImages.length - 1;
  if (currentIndex >= galleryImages.length) currentIndex = 0;
  document.getElementById("lightbox-img").src = galleryImages[currentIndex].src;
}

document.getElementById("lightbox").addEventListener("click", function(e){
  if(e.target.id === "lightbox") this.style.display = "none";
});

// ============ Before/After Sliders ============
const allContainers = document.querySelectorAll(".compare-container");

allContainers.forEach(container => {
  const slider = container.querySelector(".slider");
  const overlay = container.querySelector(".overlay");

  function setInitialSlider() {
    overlay.style.width = container.offsetWidth / 2 + "px";
    slider.style.left = container.offsetWidth / 2 + "px";
  }

  window.addEventListener("load", setInitialSlider);
  window.addEventListener("resize", setInitialSlider);

  let dragging = false;

  slider.addEventListener("mousedown", () => dragging = true);
  document.addEventListener("mouseup", () => dragging = false);
  document.addEventListener("mousemove", (e) => {
    if (!dragging) return;
    let rect = container.getBoundingClientRect();
    let offsetX = e.clientX - rect.left;
    if (offsetX < 0) offsetX = 0;
    if (offsetX > rect.width) offsetX = rect.width;
    overlay.style.width = offsetX + "px";
    slider.style.left = offsetX + "px";
  });

  // Touch events
  slider.addEventListener("touchstart", () => dragging = true);
  document.addEventListener("touchend", () => dragging = false);
  document.addEventListener("touchmove", (e) => {
    if (!dragging) return;
    let touch = e.touches[0];
    let rect = container.getBoundingClientRect();
    let offsetX = touch.clientX - rect.left;
    if (offsetX < 0) offsetX = 0;
    if (offsetX > rect.width) offsetX = rect.width;
    overlay.style.width = offsetX + "px";
    slider.style.left = offsetX + "px";
  });
});

// ============ Chocolate Popup ============
function openChocolatePopup() {
  document.getElementById("chocolatePopup").style.display = "flex";
}

function closeChocolatePopup() {
  document.getElementById("chocolatePopup").style.display = "none";
}

document.getElementById("chocolatePopup").addEventListener("click", function(e){
  if(e.target.id === "chocolatePopup") closeChocolatePopup();
});

document.addEventListener("keydown", function(e){
  if(e.key === "Escape") closeChocolatePopup();
});

function calculateChocolateTotal() {
  var packagePrice = parseInt(document.getElementById("cpackage").value) || 0;
  var deliveryPrice = parseInt(document.getElementById("cdelivery").value) || 0;
  document.getElementById("chocolateTotal").innerText = packagePrice + deliveryPrice;
}

function sendChocolateOrder(event) {
  event.preventDefault();
  var name = document.getElementById("cname").value;
  var phone = document.getElementById("cphone").value;
  var packagePrice = document.getElementById("cpackage").value;
  var delivery = document.getElementById("cdelivery").value;
  var total = document.getElementById("chocolateTotal").innerText;
  var notes = document.getElementById("cnotes").value;

  var message = "Dubai Chocolate Order:%0A"
              + "Name: " + name + "%0A"
              + "Customer Phone: " + phone + "%0A"
              + "Package Price: $" + packagePrice + "%0A"
              + "Delivery Fee: $" + delivery + "%0A"
              + "Total: $" + total + "%0A"
              + "Notes: " + notes;

  window.location.href = "sms:6094128005?body=" + message;
}
</script>

</body>
</html>
