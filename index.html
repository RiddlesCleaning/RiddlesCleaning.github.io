<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Shore Thing Cleaning Solutions</title>
<style>

/* ================= Body ================= */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #add8e6;
  color: #fff;
  overflow-x: hidden;
}

/* ================= Sticky Header ================= */
header {
  padding: 20px;
  position: sticky;
  top: 0;
  background: rgba(0,0,0,0.85);
  z-index: 10; /* lowered from 1000 */
  display: flex;
  flex-direction: column;
  align-items: center;
}

.main-image {
  max-width: 320px;
  border-radius: 12px;
  margin-bottom: 10px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

/* ================= Buttons ================= */
.buttons {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
  margin-bottom: 10px;
}

.btn {
  padding: 15px 20px;
  border-radius: 8px;
  font-weight: bold;
  text-decoration: none;
  color: white;
  transition: all 0.3s ease;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.btn::after {
  content: '';
  position: absolute;
  top:0; left:0;
  width: 100%; height: 100%;
  background: rgba(255,255,255,0.1);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s ease;
  border-radius: 8px;
}
.btn:hover::after { transform: scaleX(1); }

/* Button Colors */
.call { background: #28a745; border: 3px solid #fff; }
.facebook { background: #1877F2; border: 3px solid #fff; }
.tiktok { background: #111; border: 3px solid #fff; }
.instagram { background: #C13584; border: 3px solid #fff; }
.custom { background: #6f42c1; border: 3px solid #fff; }

/* Chocolate Button */
.chocolate {
  background: linear-gradient(45deg,#d4af37,#8B4513);
  border: 3px solid #fff;
}

/* Cleaning Button */
.cleaning {
  background: #ff6f00;
  border: 3px solid #fff;
  font-size: 1.05em;
  box-shadow: 0 0 15px rgba(255,111,0,0.6);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0% { box-shadow: 0 0 15px rgba(255,111,0,0.6); }
  50% { box-shadow: 0 0 25px rgba(255,111,0,1); }
  100% { box-shadow: 0 0 15px rgba(255,111,0,0.6); }
}

/* ================= Floating Upsell Badge ================= */
#upsellBadge {
  position: fixed;
  top: 20px;
  right: 20px;
  background: #ffdd00;
  color: #000;
  padding: 15px 20px;
  font-weight: bold;
  font-size: 16px;
  clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
  z-index: 6000;
  animation: bounce 1.5s infinite;
  text-align:center;
}
@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}

/* ================= Gallery ================= */
#gallery {
  padding: 60px 20px;
  display: flex;
  justify-content: center;
  position: relative; /* z-index removed */
}

.gallery-container {
  display:flex;
  overflow-x:auto;
  scroll-snap-type: x mandatory;
  gap:10px;
  max-width:1100px;
}

.gallery-container img {
  flex: 0 0 auto;
  width: 250px;
  height:200px;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
  scroll-snap-align:center;
  transition: transform 0.3s;
}
.gallery-container img:hover { transform: scale(1.05); }

/* ================= Before/After ================= */
.before-after-section { 
  padding:60px 20px; 
  background:#0d0d0d; 
}

.before-after-section h2 { 
  margin-bottom:30px; 
  font-size:28px; 
  text-align:center; 
}

.compare-container {
  position:relative;
  max-width:800px;
  margin:0 auto 50px auto;
  overflow:hidden;
  border-radius:12px;
}

.compare-container img { 
  display:block; 
  width:100%; 
}

.overlay { 
  position:absolute; 
  top:0; 
  left:0; 
  width:50%; 
  height:100%; 
  overflow:hidden; 
}

.overlay img { 
  height:100%; 
  object-fit:cover; 
}

.slider { 
  position:absolute; 
  top:0; 
  left:50%; 
  width:4px; 
  height:100%; 
  background:white; 
  cursor: ew-resize; 
}

/* ================= Popups ================= */
.popup {
  display:none; 
  position:fixed; 
  top:0; 
  left:0; 
  width:100%; 
  height:100%;
  background: rgba(0,0,0,0.9);
  justify-content:center; 
  align-items:center; 
  overflow-y:auto; 
  padding:20px; 
  z-index:5000;
}
.popup.show { display:flex; }

.popup-content {
  background:white; 
  color:#333; 
  width:100%; 
  max-width:600px;
  padding:25px; 
  border-radius:15px; 
  position:relative; 
  text-align:center; 
  max-height:90vh; 
  overflow-y:auto;
}

.close-popup { 
  position:absolute; 
  right:15px; 
  top:10px; 
  font-size:22px; 
  cursor:pointer; 
}

.payment-btn {
  padding: 10px 20px; 
  margin: 10px;
  background:#28a745; 
  color:#fff; 
  font-weight:bold;
  border:none; 
  border-radius:8px; 
  cursor:pointer;
}

.footer-badge { 
  text-align:center; 
  margin:40px 0 20px 0; 
  font-size:14px; 
  color:#fff; 
  font-weight:bold; 
}

</style>
</head>
<body>

<!-- Floating Upsell Badge -->
<div id="upsellBadge">BANG! Free Dubai Chocolate $30 Value</div>

<header>
  <img class="main-image" src="header image.JPG" alt="A Shore Thing">
  <div class="buttons">
    <a class="btn custom" href="#">Custom Gifts</a>
    <a class="btn cleaning" onclick="openCleaningPopup()">Deep Clean / Cleaning Services</a>
    <a class="btn call" href="tel:6094128005">Call Now</a>
    <a class="btn facebook" href="#">Facebook</a>
    <a class="btn tiktok" href="#">TikTok</a>
    <a class="btn instagram" href="#">Instagram</a>
    <a class="btn chocolate" onclick="openChocolatePopup()">Dubai Chocolate</a>
  </div>
</header>

<!-- Gallery -->
<section id="gallery">
  <div class="gallery-container" id="galleryScroll">
    <img src="13 right side bed clean.JPG">
    <img src="4 corner after 1.JPG">
    <img src="1 clean closet floor.JPG">
    <img src="10 corner bottom after 2.JPG">
    <img src="11 window sill bottom after.JPG">
  </div>
</section>

<!-- Before/After Sections (unchanged) -->
<section class="before-after-section">

  <div class="compare-container">

    <div class="overlay"><img src="15 corner bottom before 1.JPG"></div>

</section>

<section class="before-after-section">
  <h2>Before & After 2</h2>
  <div class="compare-container">
    <img src="nasty after.JPG">
    <div class="overlay"><img src="nasty before.JPG"></div>
    <div class="slider"></div>
  </div>
</section>

<section class="before-after-section">
  <h2>Before & After 3</h2>
  <div class="compare-container">
    <img src="sink after 1.JPG">
    <div class="overlay"><img src="sink 1 before.JPG"></div>
    <div class="slider"></div>
  </div>
</section>

<div class="footer-badge">Woman-Owned Small Business</div>

</body>
</html>
