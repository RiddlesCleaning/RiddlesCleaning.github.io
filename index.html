<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Shore Thing Cleaning Solutions</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: #fff;
  text-align: center;
}

header {
  padding: 40px 20px 20px;
}

.main-image {
  max-width: 320px;
  border-radius: 12px;
  margin-bottom: 25px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

/* Buttons */
.buttons {
  display: flex;
  flex-direction: column;
  gap: 15px;
  max-width: 320px;
  margin: auto;
  padding-bottom: 40px;
}

.btn {
  padding: 15px;
  border-radius: 8px;
  font-weight: bold;
  text-decoration: none;
  color: white;
  transition: 0.3s;
}

.btn:hover {
  opacity: 0.85;
  transform: translateY(-2px);
}

.call { background: #28a745; }
.facebook { background: #1877F2; }
.tiktok { background: #111; border: 1px solid #fff; }
.custom { background: #6f42c1; }
.Dubai Chocolate { background: #6f42c1; border: 1px solid #fff; }

/* Gallery */
#gallery {
  padding: 60px 20px;
  background: #111;
}

#gallery h2 {
  margin-bottom: 40px;
  font-size: 28px;
}

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  max-width: 1100px;
  margin: auto;
}

.gallery-grid img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.gallery-grid img:hover {
  transform: scale(1.05);
}

/* Lightbox */
#lightbox {
  position: fixed;
  display: none;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 999;
}

#lightbox img {
  max-width: 90%;
  max-height: 80%;
  border-radius: 10px;
  display: block;
  filter: none !important;           /* remove any tint */
  background: none !important;       /* remove background color */
  mix-blend-mode: normal !important; /* prevent blending */
  box-shadow: 0 20px 40px rgba(0,0,0,0.7);
}

.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 40px;
  color: white;
  cursor: pointer;
  padding: 10px;
  user-select: none;
  z-index: 1000;
}

.arrow.left { left: 20px; }
.arrow.right { right: 20px; }

/* Before/After Sliders */
.before-after-section {
  padding: 60px 20px;
  background: #0d0d0d;
}

.before-after-section h2 {
  margin-bottom: 30px;
  font-size: 28px;
}

.compare-container {
  position: relative;
  max-width: 800px;
  margin: auto 0 50px;
  overflow: hidden;
  border-radius: 12px;
  user-select: none;
}

.compare-container img {
  display: block;
  width: 100%;
  height: auto;
}

.overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 50%; /* start at 50% */
  height: 100%;
  overflow: hidden;
}

.overlay img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.slider {
  position: absolute;
  top: 0;
  left: 50%;
  width: 4px;
  height: 100%;
  background: white;
  cursor: ew-resize;
  z-index: 2;
  border-radius: 2px;
}
</style>
</head>
<body>

<header>
  <img class="main-image" src="header image.JPG" alt="A Shore Thing">

 <div class="buttons">
  <a class="btn custom" href="https://riddlescleaning.github.io/RiddlesKeyRings-Things.github.io-/" target="_blank">
    Custom Gifts
  </a>

  <a class="btn call" href="tel:6094128005">
    Call Now
  </a>

  <a class="btn facebook" href="https://www.facebook.com/jackie.riddle.98" target="_blank">
    Facebook
  </a>

  <a class="btn tiktok" href="https://www.tiktok.com/@jackieriddle4" target="_blank">
    TikTok
  </a>
</div>
</header>

<!-- Gallery -->
<section id="gallery">
  <h2>Our Work</h2>
  <div class="gallery-grid">
    <img src="13 right side bed clean.JPG" onclick="openLightbox(this)">
    <img src="4 corner after 1.JPG" onclick="openLightbox(this)">
    <img src="1 clean closet floor.JPG" onclick="openLightbox(this)">
    <img src="10 corner bottom after 2.JPG" onclick="openLightbox(this)">
    <img src="11 window sill bottom after.JPG" onclick="openLightbox(this)">
  </div>
</section>

<!-- Before/After Sliders -->
<section class="before-after-section">
  <h2>Before & After 1</h2>
  <div class="compare-container">
    <img src="7 corner bottom after 1.JPG" alt="Before">
    <div class="overlay">
      <img src="15 corner bottom before 1.JPG" alt="After">
    </div>
    <div class="slider"></div>
  </div>
</section>

<section class="before-after-section">
  <h2>Before & After 2</h2>
  <div class="compare-container">
    <img src="nasty after.JPG" alt="Before">
    <div class="overlay">
      <img src="nasty before.JPG" alt="After">
    </div>
    <div class="slider"></div>
  </div>
</section>

<section class="before-after-section">
  <h2>Before & After 3</h2>
  <div class="compare-container">
    <img src="sink after 1.JPG" alt="Before">
    <div class="overlay">
      <img src="sink 1 before.JPG" alt="After">
    </div>
    <div class="slider"></div>
  </div>
</section>

<!-- Lightbox -->
<div id="lightbox">
  <span class="arrow left" onclick="changeSlide(-1)">❮</span>
  <img id="lightbox-img">
  <span class="arrow right" onclick="changeSlide(1)">❯</span>
</div>

<script>
// ===== Lightbox =====
let galleryImages = document.querySelectorAll(".gallery-grid img");
let currentIndex = 0;

function openLightbox(img) {
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = img.src;
  currentIndex = Array.from(galleryImages).indexOf(img);
}

function changeSlide(direction) {
  currentIndex += direction;
  if (currentIndex < 0) currentIndex = galleryImages.length - 1;
  if (currentIndex >= galleryImages.length) currentIndex = 0;
  document.getElementById("lightbox-img").src = galleryImages[currentIndex].src;
}

document.getElementById("lightbox").addEventListener("click", function(e){
  if(e.target.id === "lightbox") this.style.display = "none";
});

// ===== Before/After Sliders (Multiple) =====
const allContainers = document.querySelectorAll(".compare-container");

allContainers.forEach(container => {
  const slider = container.querySelector(".slider");
  const overlay = container.querySelector(".overlay");

  function setInitialSlider() {
    overlay.style.width = container.offsetWidth / 2 + "px";
    slider.style.left = container.offsetWidth / 2 + "px";
  }

  window.addEventListener("load", setInitialSlider);
  window.addEventListener("resize", setInitialSlider);

  let dragging = false;

  slider.addEventListener("mousedown", () => dragging = true);
  document.addEventListener("mouseup", () => dragging = false);
  document.addEventListener("mousemove", (e) => {
    if (!dragging) return;
    let rect = container.getBoundingClientRect();
    let offsetX = e.clientX - rect.left;
    if (offsetX < 0) offsetX = 0;
    if (offsetX > rect.width) offsetX = rect.width;
    overlay.style.width = offsetX + "px";
    slider.style.left = offsetX + "px";
  });

  // Touch events
  slider.addEventListener("touchstart", () => dragging = true);
  document.addEventListener("touchend", () => dragging = false);
  document.addEventListener("touchmove", (e) => {
    if (!dragging) return;
    let touch = e.touches[0];
    let rect = container.getBoundingClientRect();
    let offsetX = touch.clientX - rect.left;
    if (offsetX < 0) offsetX = 0;
    if (offsetX > rect.width) offsetX = rect.width;
    overlay.style.width = offsetX + "px";
    slider.style.left = offsetX + "px";
  });
});
</script>

</body>
</html>
